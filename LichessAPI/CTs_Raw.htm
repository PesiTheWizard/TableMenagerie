<html>
<head>
<title>Raw data - various APIs</title>
<script>
function QueryEndpoint(ClBt)
{
	ClBt.disabled = true;
	const site = document.getElementById("site").value;
	const endPoint = document.getElementById("EP").value;
	const OGresp = document.getElementById("stts");
	const HL = document.getElementById("hdrs");
	const svr = document.getElementById("svar");
	if( (OGresp===null)||(HL===null)||(svr===null) )
	{
		console.log("getElementById fail");
		return;
	}
	OGresp.innerText = "Fetching data...";
	svr.innerText = "Waiting for response...";
	fetch(`https://${site}.org/api/${endPoint}`).then((response) => {
		OGresp.innerText = "Response code = ".concat(response.status);
		for(let [k,v] of response.headers){lister(`${k} : ${v}`,HL,'li');}
		return response.text();
	}).then((response) => {
		svr.innerText = response;
	}).catch((error) => {
		console.log(error);
	});
}
function lister(listedText, ParntNde, ElType)
{
	const listEntry = document.createElement(ElType);
	const entryText = document.createTextNode(listedText);
	listEntry.appendChild(entryText);
	ParntNde.appendChild(listEntry);
}
</script>
</head>
<body>
<select id="site">
<option value="lichess">lichess</option>
<option value="lishogi">lishogi</option>
<option value="lidraughts">lidraughts</option>
<option value="playstrategy" disabled>playstrategy</option>
</select>
<select id="EP">
<option value="tournament">tournament</option>
<option value="simul">simul</option>
</select>
<input type="button" value="Get raw data" onclick="QueryEndpoint(this)">
<hr>
<div id="stts"></div>
<ul id="hdrs"></ul>
<div id="svar"></div>
</body>
</html>
